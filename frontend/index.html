<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lector de PDF a Voz</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #34495e;
        }
        input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 2px dashed #3498db;
            border-radius: 6px;
            cursor: pointer;
            box-sizing: border-box;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        button {
            width: 100%;
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #27ae60;
        }
        .result-box {
            margin-top: 30px;
            display: none;
        }
        audio {
            width: 100%;
            margin-bottom: 15px;
        }
        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            border: 1px solid #bdc3c7;
            border-radius: 6px;
            resize: vertical;
            box-sizing: border-box;
        }
        .loading {
            display: none;
            text-align: center;
            color: #3498db;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 PDF a Voz (Gratis)</h1>
    
    <div class="form-group">
        <label for="pdfFile">Selecciona tu PDF:</label>
        <input type="file" id="pdfFile" accept=".pdf">
    </div>

    <div class="form-group checkbox-group">
        <input type="checkbox" id="translateCheck">
        <label for="translateCheck" style="margin: 0;">¿Traducir de Inglés a Español?</label>
    </div>

    <button type="button" id="processBtn">Procesar y Escuchar</button>

    <div class="loading" id="loadingText">Procesando tu PDF y generando audio... por favor espera.</div>

    <div class="result-box" id="resultBox">
        <h3>🎵 Reproductor de Audio:</h3>
        <audio id="audioPlayer" controls></audio>

        <h3>📝 Texto extraído:</h3>
        <textarea id="extractedText" readonly></textarea>
    </div>
</div>

<script>
    const SERVER_URL = "http://127.0.0.1:5000";

    document.getElementById('processBtn').addEventListener('click', async (e) => {
        e.preventDefault(); //<-- Evita que la pagina se borre o recargue
        
        const fileInput = document.getElementById('pdfFile');
        const translateCheck = document.getElementById('translateCheck').checked;
        const loadingText = document.getElementById('loadingText');
        const resultBox = document.getElementById('resultBox');
        const audioPlayer = document.getElementById('audioPlayer');
        const extractedText = document.getElementById('extractedText');

        if (!fileInput.files[0]) {
            alert("Por favor, selecciona un archivo PDF primero.");
            return;
        }

        const formData = new FormData();
        formData.append('file', fileInput.files[0]);
        formData.append('translate', translateCheck);

        // Mostrar cargando
        loadingText.style.display = "block";
        resultBox.style.display = "none";

        try {
            const response = await fetch(`${SERVER_URL}/process-pdf`, {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (data.error) {
                alert("Error: " + data.error);
            } else {
                // Mostrar resultados
                extractedText.value = data.text;
                audioPlayer.src = `${SERVER_URL}${data.audio_url}`;
                resultBox.style.display = "block";
                audioPlayer.play();
            }
        } catch (error) {
            console.error(error);
            alert("No se pudo conectar con el servidor. ¿Está app.py corriendo?");
        } finally {
            loadingText.style.display = "none";
        }
    });
</script>

</body>
</html>
